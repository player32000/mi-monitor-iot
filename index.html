<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Monitoreo IoT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f3; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; border-top: 8px solid #00d2ff; }
        h1 { color: #333; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        #dato { font-size: 4rem; font-weight: bold; color: #00d2ff; margin: 15px 0; }
        .status { font-size: 0.85rem; padding: 5px 12px; border-radius: 15px; background: #eee; display: inline-block; }
        .online { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Nivel de Producción</h1>
    <div id="dato">0%</div>
    <div id="status" class="status">Iniciando...</div>
</div>

<script>
    // IMPORTANTE: Debe ser el mismo que en Wokwi
    const TOPIC = "miproyecto/sensor1"; 
    
    // Configuración para conexión segura desde GitHub (WSS)
    // Usamos el puerto 8084 que es el estándar de EMQX para WebSockets Seguros
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
        clientId: 'web_client_' + Math.random().toString(16).substr(2, 8),
        keepalive: 60,
        clean: true
    });

    client.on('connect', () => {
        console.log("¡Conectado exitosamente a EMQX!");
        document.getElementById('status').innerText = "● EN LÍNEA";
        document.getElementById('status').classList.add('online');
        client.subscribe(TOPIC);
    });

    client.on('message', (topic, message) => {
        try {
            const data = JSON.parse(message.toString());
            document.getElementById('dato').innerText = Math.round(data.valor) + "%";
            
            // Guardar en teléfono (Plan Básico)
            console.log("Dato recibido y guardado localmente:", data.valor);
        } catch (e) {
            console.error("Error al procesar JSON", e);
        }
    });

    client.on('error', (err) => {
        console.error("Error de conexión:", err);
        document.getElementById('status').innerText = "❌ ERROR";
    });
</script>

</body>
</html>
